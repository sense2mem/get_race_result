name: Boat Race Results

permissions:
  contents: write

on:
  schedule:
    - cron: '11 23 * * *'
      timezone: 'Asia/Tokyo'
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily: 当日分のみ / backfill: 過去データをまとめて取得'
        required: true
        default: 'backfill'
        type: choice
        options:
          - backfill
          - daily
      days:
        description: 'backfill 時に取得する日数'
        required: false
        default: '365'
        type: string
      start_date:
        description: 'backfill の開始日 (YYYYMMDD)。指定時は days より優先'
        required: false
        default: ''
        type: string
      end_date:
        description: 'backfill の終了日 (YYYYMMDD)。空欄なら実行日(JST)'
        required: false
        default: ''
        type: string
      skip_existing:
        description: '既存 JSON がある日付はスキップする'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Resolve target date
        id: target
        run: |
          echo "utc_now=$(date -u '+%F %T UTC')" >> "$GITHUB_OUTPUT"
          echo "jst_now=$(TZ=Asia/Tokyo date '+%F %T JST')" >> "$GITHUB_OUTPUT"
          echo "target_date=$(TZ=Asia/Tokyo date -d '3 hours ago' +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Show timing
        run: |
          echo "github.event.schedule = ${{ github.event.schedule }}"
          echo "UTC now  = ${{ steps.target.outputs.utc_now }}"
          echo "JST now  = ${{ steps.target.outputs.jst_now }}"
          echo "Target   = ${{ steps.target.outputs.target_date }}"
          
      - name: Run script
        env:
          INPUT_MODE: ${{ github.event.inputs.mode || 'daily' }}
          INPUT_DAYS: ${{ github.event.inputs.days || '365' }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date || '' }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date || '' }}
          INPUT_SKIP_EXISTING: ${{ github.event.inputs.skip_existing || 'true' }}
        run: |
          set -e

          if [ "$INPUT_MODE" = "backfill" ]; then
            CMD="python get_race_results.py --output-dir results"

            if [ -n "$INPUT_START_DATE" ]; then
              CMD="$CMD --start-date $INPUT_START_DATE"

              if [ -n "$INPUT_END_DATE" ]; then
                CMD="$CMD --end-date $INPUT_END_DATE"
              fi
            else
              CMD="$CMD --days $INPUT_DAYS"

              if [ -n "$INPUT_END_DATE" ]; then
                CMD="$CMD --end-date $INPUT_END_DATE"
              fi
            fi

            if [ "$INPUT_SKIP_EXISTING" = "true" ]; then
              CMD="$CMD --skip-existing"
            fi
          else
            CMD="python get_race_results.py --output-dir results"
          fi

          echo "Run: $CMD"
          eval "$CMD"

      - name: Commit results
        uses: EndBug/add-and-commit@v9
        with:
          add: 'results/*.json'
          message: 'Update race results'
